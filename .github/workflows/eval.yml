name: Agent Evals

on:
  pull_request:
    paths:
      - "services/orchestrator/**"
      - "packages/contracts/**"
  workflow_dispatch:

jobs:
  genkit-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: pnpm, cache-dependency-path: services/orchestrator/evals/pnpm-lock.yaml }
      - name: Install
        run: cd services/orchestrator/evals && pnpm install --frozen-lockfile
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - name: Run Genkit evals
        run: cd services/orchestrator/evals && pnpm run eval
      - name: Gate on ≥95% pass
        run: cd services/orchestrator/evals && pnpm run eval:gate
