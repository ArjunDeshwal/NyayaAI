repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate

  - repo: local
    hooks:
      - id: no-deprecated-names
        name: Block deprecated Google product names
        entry: bash -c 'if grep -rE "(PaLM|Bard|firebase_vertexai|google_generative_ai|Cloud DLP|Agentspace|Imagen 3|Gemini 1\.)" --include="*.md" --include="*.py" --include="*.ts" --include="*.dart" --include="*.go" . ; then echo "Deprecated name detected — see .claude/skills/nyayai-gsc-submission/SKILL.md blocker list"; exit 1; fi'
        language: system
        pass_filenames: false
