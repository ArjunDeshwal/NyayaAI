[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nyayai-taxonomy"
version = "0.1.0"
description = "India-context protected-attribute schema for NyayaAI"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "NyayaAI Team", email = "team@nyayai.app" }]
dependencies = [
  "pydantic>=2.6",
  "rapidfuzz>=3.9",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "hypothesis>=6.100",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nyayai_taxonomy"]

[tool.ruff]
extend = "../../pyproject.toml"

[tool.mypy]
python_version = "3.12"
strict = true
